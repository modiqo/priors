<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 430" font-family="system-ui, -apple-system, sans-serif">
  <rect width="920" height="430" fill="#EDE9DC"/>
  <text x="36" y="46" font-family="ui-monospace, Menlo, monospace" font-size="13" letter-spacing="3" fill="#1A342E" opacity="0.75">01 · THE PROBLEM — EVERY RUN STARTS FROM ZERO</text>
  <line x1="36" y1="60" x2="884" y2="60" stroke="#1A342E" stroke-width="2"/>

  <!-- the loop -->
  <g font-size="16" fill="#1A342E">
    <rect x="70" y="120" width="200" height="64" fill="none" stroke="#1A342E" stroke-width="2.5"/>
    <text x="170" y="147" text-anchor="middle" font-weight="700">You ask for a review</text>
    <text x="170" y="170" text-anchor="middle" font-family="ui-monospace, Menlo, monospace" font-size="14" opacity="0.7">run 1</text>

    <rect x="360" y="120" width="200" height="64" fill="#1A342E"/>
    <text x="460" y="147" text-anchor="middle" font-weight="700" fill="#EDE9DC">35 findings</text>
    <text x="460" y="170" text-anchor="middle" font-size="14" fill="#EDE9DC" opacity="0.75">a big, useful list</text>

    <rect x="650" y="120" width="200" height="64" fill="none" stroke="#1A342E" stroke-width="2.5"/>
    <text x="750" y="147" text-anchor="middle" font-weight="700">You fix 22 of them</text>
    <text x="750" y="170" text-anchor="middle" font-size="14" opacity="0.7">and skip a few on purpose</text>

    <rect x="360" y="270" width="200" height="64" fill="#DC5A17"/>
    <text x="460" y="297" text-anchor="middle" font-weight="700" fill="#EDE9DC">25 “new” findings</text>
    <text x="460" y="320" text-anchor="middle" font-size="14" fill="#EDE9DC" opacity="0.85">run 2 — wait, what?</text>
  </g>

  <g stroke="#1A342E" stroke-width="2.5" fill="none">
    <path d="M272 152 L356 152"/><path d="M348 146 L358 152 L348 158" fill="#1A342E" stroke="none"/>
    <path d="M562 152 L646 152"/><path d="M638 146 L648 152 L638 158" fill="#1A342E" stroke="none"/>
    <path d="M750 186 L750 302 L564 302"/><path d="M574 296 L562 302 L574 308" fill="#1A342E" stroke="none"/>
    <path d="M358 302 L170 302 L170 188"/><path d="M164 198 L170 186 L176 198" fill="#1A342E" stroke="none"/>
  </g>

  <text x="460" y="392" text-anchor="middle" font-size="17" font-style="italic" fill="#1A342E">Some are ones you chose to skip. Some are old ones, reworded. Some were always there.</text>
  <text x="460" y="416" text-anchor="middle" font-size="17" font-weight="700" fill="#DC5A17">You can’t tell which — and nothing you fixed gets acknowledged.</text>
</svg>
