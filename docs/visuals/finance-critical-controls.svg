<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 700" role="img" aria-labelledby="title desc">
  <title id="title">Priors and financial control boundaries</title>
  <desc id="desc">Financial source identities feed Priors review continuity, which carries exceptions, model-risk findings, review coverage, policies, and data recipes. Controlled systems, maker-checker approvals, limits, reconciliations, audit logs, and sign-off retain authority.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0 0 L10 5 L0 10 Z" fill="#173B34"/>
    </marker>
  </defs>
  <rect width="1200" height="700" rx="28" fill="#F4F0E5"/>
  <text x="52" y="50" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="14" letter-spacing="3" fill="#47645C">FINANCE</text>
  <text x="52" y="90" font-family="system-ui, -apple-system, sans-serif" font-size="29" font-weight="700" fill="#173B34"><tspan>Remember the review.</tspan><tspan dx="9">Keep authority with the controls.</tspan></text>

  <g font-family="system-ui, -apple-system, sans-serif">
    <text x="52" y="145" font-size="13" letter-spacing="2" fill="#47645C">CANONICAL FINANCIAL IDENTITY</text>
    <rect x="52" y="164" width="260" height="336" rx="22" fill="#FFFDFC" stroke="#B9C8C2" stroke-width="2"/>
    <g font-size="13" font-weight="700" fill="#173B34">
      <rect x="80" y="202" width="204" height="48" rx="12" fill="#E1ECE7"/><text x="182" y="232" text-anchor="middle">report definition + query</text>
      <rect x="80" y="264" width="204" height="48" rx="12" fill="#E1ECE7"/><text x="182" y="294" text-anchor="middle">parameters + cutoff</text>
      <rect x="80" y="326" width="204" height="48" rx="12" fill="#E1ECE7"/><text x="182" y="356" text-anchor="middle">source data snapshot</text>
      <rect x="80" y="388" width="204" height="48" rx="12" fill="#E1ECE7"/><text x="182" y="418" text-anchor="middle">model + assumptions</text>
    </g>
    <text x="182" y="468" text-anchor="middle" font-size="12.5" fill="#47645C">Every dependency that can</text>
    <text x="182" y="486" text-anchor="middle" font-size="12.5" fill="#47645C">invalidate the conclusion</text>

    <path d="M322 332 H375" stroke="#173B34" stroke-width="3" marker-end="url(#arrow)"/>

    <text x="405" y="145" font-size="13" letter-spacing="2" fill="#47645C">PRIORS REVIEW CONTINUITY</text>
    <rect x="386" y="164" width="430" height="336" rx="22" fill="#173B34"/>
    <g>
      <rect x="416" y="198" width="370" height="52" rx="13" fill="#284E45"/>
      <circle cx="441" cy="224" r="10" fill="#D95D24"/><text x="466" y="229" font-size="14" font-weight="700" fill="#FFFDFC">Reconciliation exceptions</text>
      <rect x="416" y="262" width="370" height="52" rx="13" fill="#284E45"/>
      <circle cx="441" cy="288" r="10" fill="#D95D24"/><text x="466" y="293" font-size="14" font-weight="700" fill="#FFFDFC">Model-risk findings</text>
      <rect x="416" y="326" width="370" height="52" rx="13" fill="#284E45"/>
      <circle cx="441" cy="352" r="10" fill="#2F7967"/><text x="466" y="357" font-size="14" font-weight="700" fill="#FFFDFC">Close-review depth floor</text>
      <rect x="416" y="390" width="370" height="52" rx="13" fill="#284E45"/>
      <circle cx="441" cy="416" r="10" fill="#E9C46A"/><text x="466" y="421" font-size="14" font-weight="700" fill="#FFFDFC">Accepted policy + data recipe</text>
      <text x="601" y="474" text-anchor="middle" font-size="13" font-weight="700" fill="#BFDCCF">continuity · conflict visibility · observable review</text>
    </g>

    <path d="M826 332 H879" stroke="#D95D24" stroke-width="3" stroke-dasharray="8 7" marker-end="url(#arrow)"/>
    <text x="852" y="310" text-anchor="middle" font-size="11.5" font-weight="700" fill="#D95D24">INFORMS</text>

    <text x="900" y="145" font-size="13" letter-spacing="2" fill="#47645C">CONTROLLED ACTION DOMAIN</text>
    <rect x="890" y="164" width="258" height="336" rx="22" fill="#FFFDFC" stroke="#D95D24" stroke-width="3"/>
    <g font-size="13" font-weight="700" fill="#173B34">
      <text x="1019" y="203" text-anchor="middle" font-size="12" letter-spacing="1.5" fill="#D95D24">AUTHORITATIVE</text>
      <rect x="918" y="222" width="202" height="42" rx="11" fill="#F7E0D3"/><text x="1019" y="248" text-anchor="middle">system of record</text>
      <rect x="918" y="276" width="202" height="42" rx="11" fill="#F7E0D3"/><text x="1019" y="302" text-anchor="middle">maker-checker approval</text>
      <rect x="918" y="330" width="202" height="42" rx="11" fill="#F7E0D3"/><text x="1019" y="356" text-anchor="middle">position + transaction limits</text>
      <rect x="918" y="384" width="202" height="42" rx="11" fill="#F7E0D3"/><text x="1019" y="410" text-anchor="middle">reconciliation + audit log</text>
      <rect x="918" y="438" width="202" height="42" rx="11" fill="#173B34"/><text x="1019" y="464" text-anchor="middle" fill="#FFFDFC">accountable sign-off</text>
    </g>

    <line x1="52" y1="552" x2="1148" y2="552" stroke="#D95D24" stroke-width="3"/>
    <rect x="326" y="530" width="548" height="44" rx="22" fill="#D95D24"/>
    <text x="600" y="558" text-anchor="middle" font-size="14" font-weight="700" fill="#FFFDFC">A REMEMBERED POLICY DOES NOT AUTHORIZE A TRANSACTION</text>

    <g transform="translate(52 606)">
      <text x="0" y="0" font-size="13" letter-spacing="2" fill="#47645C">PRIORS CAN</text>
      <text x="0" y="30" font-size="16" font-weight="700" fill="#173B34">surface · require review · preserve decisions · expose conflicts</text>
      <text x="690" y="0" font-size="13" letter-spacing="2" fill="#47645C">PRIORS CANNOT</text>
      <text x="690" y="30" font-size="16" font-weight="700" fill="#D95D24">post · transfer · trade · approve · certify</text>
    </g>
  </g>
</svg>
