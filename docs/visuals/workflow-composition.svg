<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 700" role="img" aria-labelledby="title desc">
  <title id="title">One review produces several kinds of memory</title>
  <desc id="desc">A landing page review produces a conclusion, coverage baseline, measurement rule, product doctrine, and tool recipe, each with a different next-run consequence.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0 0 L10 5 L0 10 Z" fill="#173B34"/>
    </marker>
  </defs>
  <rect width="1200" height="700" rx="28" fill="#F4F0E5"/>
  <text x="52" y="50" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="14" letter-spacing="3" fill="#47645C">ONE WORKFLOW · FIVE MEMORY BEHAVIORS</text>
  <text x="52" y="90" font-family="system-ui, -apple-system, sans-serif" font-size="29" font-weight="700" fill="#173B34">“Review memory” is not one type.</text>

  <g font-family="system-ui, -apple-system, sans-serif">
    <rect x="55" y="195" width="250" height="310" rx="22" fill="#173B34"/>
    <text x="180" y="236" text-anchor="middle" font-size="13" letter-spacing="2" fill="#BFDCCF">INPUT</text>
    <rect x="92" y="266" width="176" height="144" rx="13" fill="#FFFDFC"/>
    <rect x="108" y="282" width="144" height="18" rx="4" fill="#BFDCCF"/>
    <rect x="108" y="311" width="98" height="9" rx="4" fill="#D8E2DE"/>
    <rect x="108" y="330" width="126" height="9" rx="4" fill="#D8E2DE"/>
    <rect x="108" y="357" width="78" height="30" rx="15" fill="#D95D24"/>
    <text x="147" y="377" text-anchor="middle" font-size="11" font-weight="700" fill="#FFFDFC">JOIN</text>
    <text x="180" y="448" text-anchor="middle" font-size="20" font-weight="700" fill="#FFFDFC">Landing-page review</text>
    <text x="180" y="476" text-anchor="middle" font-size="13" fill="#BFDCCF">one run · one target</text>

    <text x="412" y="151" font-size="13" letter-spacing="2" fill="#47645C">COMPOSED RECORD</text>
    <text x="930" y="151" font-size="13" letter-spacing="2" fill="#47645C">NEXT-RUN CONSEQUENCE</text>

    <g>
      <rect x="390" y="170" width="350" height="78" rx="16" fill="#F7E0D3"/>
      <circle cx="423" cy="209" r="17" fill="#D95D24"/><text x="423" y="215" text-anchor="middle" font-size="16" font-weight="700" fill="#FFFDFC">1</text>
      <text x="454" y="201" font-size="16" font-weight="700" fill="#173B34">Conclusion</text>
      <text x="454" y="224" font-size="13" fill="#47645C">“Join button records no email.”</text>
      <rect x="850" y="180" width="298" height="58" rx="15" fill="#FFFDFC" stroke="#D7C8B9" stroke-width="2"/>
      <text x="999" y="205" text-anchor="middle" font-size="14" font-weight="700" fill="#173B34">Re-check the exact form state</text>
      <text x="999" y="224" text-anchor="middle" font-size="12.5" fill="#47645C">required disposition</text>

      <rect x="390" y="263" width="350" height="78" rx="16" fill="#E1ECE7"/>
      <circle cx="423" cy="302" r="17" fill="#2F7967"/><text x="423" y="308" text-anchor="middle" font-size="16" font-weight="700" fill="#FFFDFC">2</text>
      <text x="454" y="294" font-size="16" font-weight="700" fill="#173B34">Coverage</text>
      <text x="454" y="317" font-size="13" fill="#47645C">“Pricing reviewed at major depth.”</text>
      <rect x="850" y="273" width="298" height="58" rx="15" fill="#FFFDFC" stroke="#D7C8B9" stroke-width="2"/>
      <text x="999" y="298" text-anchor="middle" font-size="14" font-weight="700" fill="#173B34">Block unchanged minor dredging</text>
      <text x="999" y="317" text-anchor="middle" font-size="12.5" fill="#47645C">review-depth veto</text>

      <rect x="390" y="356" width="350" height="78" rx="16" fill="#F3E8BC"/>
      <circle cx="423" cy="395" r="17" fill="#A98221"/><text x="423" y="401" text-anchor="middle" font-size="16" font-weight="700" fill="#FFFDFC">3</text>
      <text x="454" y="387" font-size="16" font-weight="700" fill="#173B34">Measurement rule</text>
      <text x="454" y="410" font-size="13" fill="#47645C">“Ignore rotating hero text in hash.”</text>
      <rect x="850" y="366" width="298" height="58" rx="15" fill="#FFFDFC" stroke="#D7C8B9" stroke-width="2"/>
      <text x="999" y="391" text-anchor="middle" font-size="14" font-weight="700" fill="#173B34">Shape future measurements</text>
      <text x="999" y="410" text-anchor="middle" font-size="12.5" fill="#47645C">run-start instruction</text>

      <rect x="390" y="449" width="350" height="78" rx="16" fill="#F7E0D3"/>
      <circle cx="423" cy="488" r="17" fill="#D95D24"/><text x="423" y="494" text-anchor="middle" font-size="16" font-weight="700" fill="#FFFDFC">4</text>
      <text x="454" y="480" font-size="16" font-weight="700" fill="#173B34">Product doctrine</text>
      <text x="454" y="503" font-size="13" fill="#47645C">“No annual discount at launch.”</text>
      <rect x="850" y="459" width="298" height="58" rx="15" fill="#FFFDFC" stroke="#D7C8B9" stroke-width="2"/>
      <text x="999" y="484" text-anchor="middle" font-size="14" font-weight="700" fill="#173B34">Inject after human acceptance</text>
      <text x="999" y="503" text-anchor="middle" font-size="12.5" fill="#47645C">standing judgment</text>

      <rect x="390" y="542" width="350" height="78" rx="16" fill="#E3EDF3"/>
      <circle cx="423" cy="581" r="17" fill="#4D7890"/><text x="423" y="587" text-anchor="middle" font-size="16" font-weight="700" fill="#FFFDFC">5</text>
      <text x="454" y="573" font-size="16" font-weight="700" fill="#173B34">Tool recipe</text>
      <text x="454" y="596" font-size="13" fill="#47645C">“Capture after fonts are ready.”</text>
      <rect x="850" y="552" width="298" height="58" rx="15" fill="#FFFDFC" stroke="#D7C8B9" stroke-width="2"/>
      <text x="999" y="577" text-anchor="middle" font-size="14" font-weight="700" fill="#173B34">Reuse for matching environment</text>
      <text x="999" y="596" text-anchor="middle" font-size="12.5" fill="#47645C">challenge when it fails</text>
    </g>
  </g>

  <path d="M314 350 H374" fill="none" stroke="#173B34" stroke-width="3" marker-end="url(#arrow)"/>
  <g stroke="#8DA49C" stroke-width="2" fill="none" marker-end="url(#arrow)">
    <path d="M744 209 H840"/><path d="M744 302 H840"/><path d="M744 395 H840"/><path d="M744 488 H840"/><path d="M744 581 H840"/>
  </g>
</svg>
