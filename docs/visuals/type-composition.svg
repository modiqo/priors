<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 650" role="img" aria-labelledby="title desc">
  <title id="title">Domain types are composed from five behavioral facets</title>
  <desc id="desc">Different domain names such as RTL finding, contract clause, and model risk finding select the same five-facet conclusion behavior, producing the same required re-check consequence.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0 0 L10 5 L0 10 Z" fill="#173B34"/>
    </marker>
  </defs>
  <rect width="1200" height="650" rx="28" fill="#F4F0E5"/>
  <text x="52" y="50" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="14" letter-spacing="3" fill="#47645C">OPEN VOCABULARY · CLOSED BEHAVIORAL GRAMMAR</text>
  <text x="52" y="91" font-family="system-ui, -apple-system, sans-serif" font-size="30" font-weight="700" fill="#173B34">Name the domain. Compose the consequence.</text>

  <g font-family="system-ui, -apple-system, sans-serif">
    <text x="64" y="148" font-size="13" letter-spacing="2" fill="#47645C">DOMAIN NOUNS</text>
    <rect x="52" y="170" width="250" height="64" rx="14" fill="#FFFDFC" stroke="#B9C8C2" stroke-width="2"/>
    <text x="77" y="197" font-size="16" font-weight="700" fill="#173B34">rtl-finding</text>
    <text x="77" y="219" font-size="13" fill="#47645C">hardware verification</text>
    <rect x="52" y="248" width="250" height="64" rx="14" fill="#FFFDFC" stroke="#B9C8C2" stroke-width="2"/>
    <text x="77" y="275" font-size="16" font-weight="700" fill="#173B34">contract-clause</text>
    <text x="77" y="297" font-size="13" fill="#47645C">legal review</text>
    <rect x="52" y="326" width="250" height="64" rx="14" fill="#FFFDFC" stroke="#B9C8C2" stroke-width="2"/>
    <text x="77" y="353" font-size="16" font-weight="700" fill="#173B34">model-risk-finding</text>
    <text x="77" y="375" font-size="13" fill="#47645C">finance</text>
    <rect x="52" y="404" width="250" height="64" rx="14" fill="#FFFDFC" stroke="#B9C8C2" stroke-width="2"/>
    <text x="77" y="431" font-size="16" font-weight="700" fill="#173B34">workflow-defect</text>
    <text x="77" y="453" font-size="13" fill="#47645C">RPA</text>

    <text x="426" y="148" font-size="13" letter-spacing="2" fill="#47645C">ONE VALIDATED BUNDLE</text>
    <rect x="390" y="170" width="420" height="360" rx="22" fill="#173B34"/>
    <text x="425" y="210" font-size="20" font-weight="700" fill="#FFFDFC">Conclusion behavior</text>
    <text x="425" y="237" font-size="13" fill="#BFDCCF">five choices stored with every record</text>

    <g font-size="14">
      <text x="425" y="282" fill="#BFDCCF">scope</text>
      <rect x="570" y="257" width="202" height="36" rx="18" fill="#284E45"/>
      <text x="671" y="281" text-anchor="middle" font-weight="700" fill="#FFFDFC">content-hash</text>
      <text x="425" y="331" fill="#BFDCCF">activation</text>
      <rect x="570" y="306" width="202" height="36" rx="18" fill="#284E45"/>
      <text x="671" y="330" text-anchor="middle" font-weight="700" fill="#FFFDFC">verify-phase</text>
      <text x="425" y="380" fill="#BFDCCF">obligation</text>
      <rect x="570" y="355" width="202" height="36" rx="18" fill="#284E45"/>
      <text x="671" y="379" text-anchor="middle" font-weight="700" fill="#FFFDFC">disposition-required</text>
      <text x="425" y="429" fill="#BFDCCF">authority</text>
      <rect x="570" y="404" width="202" height="36" rx="18" fill="#284E45"/>
      <text x="671" y="428" text-anchor="middle" font-weight="700" fill="#FFFDFC">advisory at birth</text>
      <text x="425" y="478" fill="#BFDCCF">lifecycle</text>
      <rect x="570" y="453" width="202" height="36" rx="18" fill="#284E45"/>
      <text x="671" y="477" text-anchor="middle" font-weight="700" fill="#FFFDFC">stale on change</text>
    </g>

    <text x="931" y="148" font-size="13" letter-spacing="2" fill="#47645C">KEEPER CONSEQUENCE</text>
    <rect x="898" y="192" width="250" height="240" rx="20" fill="#E1ECE7"/>
    <circle cx="1023" cy="249" r="29" fill="#2F7967"/>
    <path d="M1010 249 l9 9 18-21" fill="none" stroke="#FFFDFC" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="1023" y="306" text-anchor="middle" font-size="19" font-weight="700" fill="#173B34">Re-check the claim</text>
    <text x="1023" y="334" text-anchor="middle" font-size="14" fill="#47645C">against the exact current</text>
    <text x="1023" y="355" text-anchor="middle" font-size="14" fill="#47645C">artifact identity.</text>
    <rect x="930" y="382" width="186" height="30" rx="15" fill="#FFFDFC"/>
    <text x="1023" y="402" text-anchor="middle" font-size="12.5" font-weight="700" fill="#173B34">required before new work</text>
  </g>

  <path d="M306 319 C340 319 350 319 382 319" stroke="#173B34" stroke-width="3" fill="none" marker-end="url(#arrow)"/>
  <path d="M816 319 C846 319 860 319 890 319" stroke="#173B34" stroke-width="3" fill="none" marker-end="url(#arrow)"/>

  <rect x="52" y="567" width="1096" height="48" rx="14" fill="#F7E0D3"/>
  <text x="600" y="598" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="700" fill="#173B34">New noun? Reuse a proven bundle. New runtime verb? Change the trusted grammar.</text>
</svg>
